<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>みんカレ アイコン生成</title>
</head>
<body>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<button onclick="downloadAll()">アイコンをダウンロード</button>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size / 100;

  // 背景グラデーション
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#4F8EF7');
  bg.addColorStop(1, '#2563EB');

  // 角丸四角形
  const r = 22 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = bg;
  ctx.fill();

  // カレンダーボディ
  const calGrad = ctx.createLinearGradient(0, 26*s, 0, 84*s);
  calGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
  calGrad.addColorStop(1, 'rgba(224,237,255,0.85)');
  roundRect(ctx, 12*s, 26*s, 76*s, 58*s, 8*s, calGrad);

  // ヘッダーバー
  roundRect(ctx, 12*s, 26*s, 76*s, 22*s, 8*s, '#2563EB');
  ctx.fillStyle = '#2563EB';
  ctx.fillRect(12*s, 38*s, 76*s, 10*s);

  // ピン
  roundRect(ctx, 27*s, 18*s, 8*s, 18*s, 4*s, '#1D4ED8');
  roundRect(ctx, 65*s, 18*s, 8*s, 18*s, 4*s, '#1D4ED8');

  // グリッド線
  ctx.beginPath();
  ctx.moveTo(12*s, 64*s);
  ctx.lineTo(88*s, 64*s);
  ctx.strokeStyle = '#C7D9F8';
  ctx.lineWidth = 1*s;
  ctx.stroke();

  // 日付ドット 行1
  dot(ctx, 28*s, 56*s, 5*s, 'rgba(59,130,246,0.5)');
  dot(ctx, 50*s, 56*s, 5*s, 'rgba(59,130,246,0.5)');
  dot(ctx, 72*s, 56*s, 5*s, '#EF4444');
  // 行2
  dot(ctx, 28*s, 74*s, 5*s, 'rgba(59,130,246,0.5)');
  dot(ctx, 50*s, 74*s, 5*s, 'rgba(59,130,246,0.5)');
  dot(ctx, 72*s, 74*s, 5*s, 'rgba(59,130,246,0.5)');

  // Mウェーブ
  ctx.beginPath();
  ctx.moveTo(32*s, 43*s);
  ctx.lineTo(37*s, 33*s);
  ctx.lineTo(42*s, 43*s);
  ctx.lineTo(47*s, 33*s);
  ctx.lineTo(52*s, 43*s);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2.8*s;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // 人物 左
  ctx.globalAlpha = 0.95;
  dot(ctx, 61*s, 35*s, 3.2*s, 'white');
  arc(ctx, 56*s, 46*s, 66*s, 46*s, 61*s, 41*s, 'white', 1.8*s);
  // 人物 右
  dot(ctx, 71*s, 35*s, 3.2*s, 'white');
  arc(ctx, 66*s, 46*s, 76*s, 46*s, 71*s, 41*s, 'white', 1.8*s);
  ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

function dot(ctx, x, y, r, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function arc(ctx, x1, y1, x2, y2, cx, cy, color, lw) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cx, cy, x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function downloadAll() {
  const sizes = [512, 192, 180];
  const names = ['icon-512', 'icon-192', 'apple-touch-icon'];
  sizes.forEach((size, i) => {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    drawIcon(c, size);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = names[i] + '.png';
    a.click();
  });
}

// 初期描画
const c = document.getElementById('c512');
drawIcon(c, 512);
</script>
</body>
</html>
